server {
    listen 18444 ssl http2;
    listen [::]:18444 ssl http2;
    server_name clipbridge-us2.xushuangbo.top;

    client_max_body_size 64m;

    ssl_certificate     /home/ubuntu/.acme.sh/xushuangbo.top_ecc/fullchain.cer;
    ssl_certificate_key /home/ubuntu/.acme.sh/xushuangbo.top_ecc/xushuangbo.top.key;

    root /srv/clipbridge/web/current;
    index index.html;

    # WebSocket 必须单独走升级代理，否则会被普通 /v1/ 代理吞掉，后端会返回 400。
    location /v1/ws {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:18081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
    }

    location /healthz {
        proxy_pass http://127.0.0.1:18081/healthz;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files /index.html =404;
    }

    location ~* \.(?:js|css|png|webp|ico)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0" always;
        try_files $uri $uri/ /index.html;
    }
}
